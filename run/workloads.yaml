---
# Setting workloads according to: https://arxiv.org/abs/2210.14657
# and the MLPerf suite: https://github.com/mlcommons/inference
workloads:
  Atest:
    - arch: vgg11
      dataset: cifar10
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    - arch: resnet18
      dataset: cifar10
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    - arch: efficientnet
      dataset: cifar10
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    - arch: vgg16
      dataset: cifar100
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    - arch: resnet50
      dataset: cifar100
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    - arch: mobilenetv2
      dataset: cifar100
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
  Btest:
    # image segmentation
    - arch: unet_3d
      dataset: kits19
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    # language processing
    - arch: bert
      dataset: squad_v1.1
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    # object detection
    - arch: ssd300_vgg16
      dataset: coco2017
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
    # recommendation
    - arch: dlrm_v2
      dataset: criteo
      pretrained: true
      resumed_checkpoint_path: null
      batch_print_frequency: 100
