---
app_args:
        operation_mode: partition
        output_dir: 'logs'
        name: partition
        deterministic: True
        global_seed: 0
        dnn_accuracy_lut_file: data/classifiersA/lut.csv
        load_state_from: data/classifiersA/eyeriss/best_state.sa.pkl
        solver_type: mthggreedy

dnn_op_mode_args:
        evaluate_model_mode: False
        train_model_mode: False
        test_timeloop_accelergy_mode: False
        test_pruning_quant_mode: False
        model_summary_mode: null

workload_args:
        workload_idx: ClassifiersA
        workers: 15
        batch_size: 128
        load_serialized: False
        gpus: 0
        cpu: False
        validation_split: 0.0
        effective_train_size: 0.01
        effective_valid_size: 0.01
        effective_test_size: 0.01
        model_verbose: False

compression_args:
        pruning_group_type: rows
        pruning_high: 1.0
        pruning_low: 0.0
        pruning_incr: 0.05
        quant_high: 8
        quant_low: 4
        quant_incr: 1
        use_validation_set: False
        # constraints
        top1_constraint: 5
        top5_constraint: null
        loss_constraint: null
        mIOU_constraint: 2
        AvgPixelAcc_constraint: null
        mAP[IOU=0.5]_constraint: 5
        mAP[IoU=0.50:0.95]_constraint: null
        mAP[IOU=0.75]_constraint: null
        size_constraint: 50
        sparsity_constraint: null
 
accel_args:
        accelerator_arch_type: eyeriss
        deadline_constraint: null
        area_constraint: null

baseline_args:
        baseline_num_accelerators: 4
        baseline_homogeneous: False
        baseline_pe_array_x: [16, 25, 16, 25]
        baseline_pe_array_y: [10, 12, 25, 8]
        baseline_precision: [5, 6, 7, 8]
        baseline_sram_size: [108000, 108000, 108000, 108000]
        # Eyeriss-specific
        baseline_ifmap_spad_size: [32, 64, 24, 64]
        baseline_weights_spad_size: [512, 256, 320, 384]
        baseline_psum_spad_size: [80, 32, 32, 48]
        # Simba-specific
        baseline_input_buffer_size: null
        baseline_weight_buffer_size: null
        baseline_accum_buffer_size: null

partition_args:
        partition_results_path: data/cnn-parted/constrained
        partition_optim_metric_type: edp
        partition_optim_iterations: 100
        partition_selection_probability: 0.8
        partition_use_constrained: True
