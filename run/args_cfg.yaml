app_args:
        output_dir: 'logs'
        name: null
        deterministic: True
        global_seed: 0
        # this also turns off layer-enironment subapps
        #load_layer_lut_from: saved_logs/layer_mult_lut.pkl
        load_layer_lut_from: null

op_mode_args:
        evaluate_model_mode: False
        train_model_mode: False
        test_timeloop_accelergy_mode: True

model_args:
        arch: [mobilenet_cifar10, resnet18_cifar100]
        #resumed_checkpoint_path: /workspace/chkpts/cifar10/mobilenet_cifar10.pth
        pretrained: True
        workers: 15
        batch_size: 64
        load_serialized: False
        gpus: 0
        cpu: False
        validation_split: 0.3
        effective_train_size: 0.5
        effective_valid_size: 0.5
        effective_test_size: 1
        batch_print_frequency: 100
        model_verbose: False
        model_save_frequency: 1
        use_profiler: False
        train_epochs: 1
        retrain_epochs: 0

optimizer_args:
        #optimizer_type: sgd
        learning_rate: 0.1
        momentum: 0.9
        weight_decay: 1.e-4


