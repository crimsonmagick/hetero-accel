---
app_args:
        operation_mode: ours
        output_dir: 'out_3_13'
        name: ours
        deterministic: True
        global_seed: 0
        dnn_accuracy_lut_file: /home/welby/workspace/hetero-accel/logs/complete_ours_2026.04.01/lut.csv
        scheduler_type: ours
        solver_type: mthggreedyregret
#        load_state_from: data/mixed/eyeriss/tight_constraint/best_state.sa.pkl
        skip_exploration: False
#        load_pruned_mappings_from: data/mixed/eyeriss/tight_constraint/pruned_mappings.pkl

dnn_op_mode_args:
        evaluate_model_mode: False
        train_model_mode: False
        test_timeloop_accelergy_mode: False
        test_pruning_quant_mode: False
        model_summary_mode: null

workload_args:
        workload_idx: ClassifiersA
        workers: 16
        batch_size: 32
        load_serialized: False
        gpus: 0
        cpu: False
        validation_split: 0.0
        effective_train_size: 0.5
        effective_valid_size: 0.5
        effective_test_size: 0.5
        model_verbose: False
        optimizer_type: adam

compression_args:
        pruning_group_type: rows
        pruning_high: 1.0
        pruning_low: 0.0
        pruning_incr: 0.05
        quant_high: 7
        quant_low: 4
        quant_incr: 1
        use_validation_set: False
        # constraints
        top1_constraint: 8
        top5_constraint: null
        loss_constraint: null
        mIOU_constraint: null
        AvgPixelAcc_constraint: 2
        mAP[IOU=0.5]_constraint: 4
        mAP[IoU=0.50:0.95]_constraint: null
        mAP[IOU=0.75]_constraint: null
        size_constraint: 50
        sparsity_constraint: null

accel_args:
        accelerator_arch_type: eyeriss
        deadline_constraint: null
        area_constraint: 0.1

simanneal_args:
        simannel_state_delta: 0.4
        simanneal_Tmax: 25000.0
        simanneal_Ttmin: 2.5
        simanneal_steps: 50
#        simanneal_updates: 25 # NOT USED
        simanneal_auto_schedule: False
        simanneal_optimization_metric: edp_artificial

