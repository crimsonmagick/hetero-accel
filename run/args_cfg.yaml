---
app_args:
        operation_mode: ours
        output_dir: 'logs'
        name: ours
        deterministic: True
        global_seed: 0
        dnn_accuracy_lut_file: data/workload1.lut.csv
        scheduler_type: ours
        solver_type: mthggreedyregret
        load_state_from: data/workload1.state.sa.pkl
        skip_exploration: True
        load_pruned_mappings_from: data/workload1.pruned_mappings.pkl

dnn_op_mode_args:
        evaluate_model_mode: False
        train_model_mode: False
        test_timeloop_accelergy_mode: False
        test_pruning_quant_mode: False
        model_summary_mode: null

workload_args:
        workload_idx: A
        workers: 15
        batch_size: 128
        load_serialized: False
        gpus: 0
        cpu: False
        validation_split: 0.0
        effective_train_size: 0.5
        effective_valid_size: 0.5
        effective_test_size: 0.5
        model_verbose: False
        optimizer_type: adam

compression_args:
        pruning_group_type: rows
        pruning_high: 1.0
        pruning_low: 0.0
        pruning_incr: 0.05
        quant_high: 8
        quant_low: 4
        quant_incr: 1
        use_validation_set: False
        # constraints
        top1_constraint: 2
        top5_constraint: null
        loss_constraint: null
        mIOU_constraint: 2
        AvgPixelAcc_constraint: null
        mAP[IoU=0.50:0.95]_constraint: 2
        mAP[IOU=0.5]_constraint: null
        mAP[IOU=0.75]_constraint: null
        size_constraint: 50
        sparsity_constraint: null

accel_args:
        accelerator_arch_type: eyeriss
        deadline_constraint: null
        area_constraint: 0.1

simanneal_args:
        simannel_state_delta: 0.2
        simanneal_Tmax: 25000.0
        simanneal_Ttmin: 2.5
        simanneal_steps: 100
        simanneal_updates: 25
        simanneal_auto_schedule: False
        simanneal_optimization_metric: edp

